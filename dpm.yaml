#Deputy Config File

#LCM Channels
lcm_url: "udpm://239.255.76.67:7667?ttl=1"
command_channel: "DPM/commands"
host_info_channel: "DPM/host_info"
proc_outputs_channel: "DPM/proc_outputs"
host_procs_channel: "DPM/host_procs"

# Timer Intervals in s
monitor_interval: 5
output_interval: 5
host_status_interval: 5
procs_status_interval: 5
report_threshold: 5

#timeout in s for stopping a process
stop_timeout: 2

# Signal sent to stop a process (default SIGINT; escalates to SIGKILL on timeout)
stop_signal: "SIGINT"

# Process registry persistence (agent only)
# persist_processes: false
# persist_path: /var/lib/dpm/processes.yaml

# Maximum auto-restart attempts before suspending (-1 = unlimited)
max_restarts: -1

# Signal sent for graceful stop (SIGKILL escalation unchanged)
stop_signal: "SIGINT"

# Per-process on-disk log files. Each managed process gets one file at
# <process_log_dir>/<name>.log; merged stdout+stderr in chronological
# order. Rotated by size (process_log_max_bytes) up to process_log_backups
# generations. Set process_log_dir to an empty string to disable disk
# logging entirely (LCM streaming + ring buffer keep working).
# These are separate from dpmd's own log at /var/log/dpm/dpmd.log.
process_log_dir: /var/log/dpm/processes
process_log_max_bytes: 52428800  # 50 MB
process_log_backups: 3
